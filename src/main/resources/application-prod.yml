spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 60000
      max-lifetime: 600000
      connection-timeout: 10000

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

wx:
  miniapp:
    app-id: ${WX_APP_ID}
    app-secret: ${WX_APP_SECRET}

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

ai:
  api-key: ${AI_API_KEY}
  api-url: ${AI_API_URL}

logging:
  level:
    com.badminton: warn
    org.springframework.web: warn
  file:
    name: /var/log/badminton/app.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
      total-size-cap: 3GB

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://yourdomain.com}
