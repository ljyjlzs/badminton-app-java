server:
  port: ${SERVER_PORT:8049}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/badminton?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
      continue-on-error: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.badminton.entity
  configuration:
    map-underscore-to-camel-case: true

wx:
  miniapp:
    app-id: ${WX_APP_ID:wxb0369110c3c788ef}
    app-secret: ${WX_APP_SECRET}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:604800000}

admin:
  confirm-code: ${ADMIN_CONFIRM_CODE:CLEAR_ALL_DATA_CONFIRM}

ai:
  api-key: ${AI_API_KEY}
  api-url: ${AI_API_URL:https://token-plan-cn.xiaomimimo.com/v1/chat/completions}

logging:
  level:
    com.badminton: ${LOG_LEVEL_APP:info}
    org.springframework.web: ${LOG_LEVEL_WEB:info}
