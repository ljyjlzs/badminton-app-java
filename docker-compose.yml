version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: badminton-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: badminton
      MYSQL_USER: ${DB_USERNAME:-badminton}
      MYSQL_PASSWORD: ${DB_PASSWORD:-badminton123456}
      TZ: Asia/Shanghai
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/main/resources/db:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root123456}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - badminton-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: badminton-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: 8049
      DB_URL: jdbc:mysql://mysql:3306/badminton?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      DB_USERNAME: ${DB_USERNAME:-badminton}
      DB_PASSWORD: ${DB_PASSWORD:-badminton123456}
      WX_APP_ID: ${WX_APP_ID}
      WX_APP_SECRET: ${WX_APP_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-604800000}
      AI_API_KEY: ${AI_API_KEY}
      AI_API_URL: ${AI_API_URL}
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx512m}
    ports:
      - "${APP_PORT:-8049}:8049"
    volumes:
      - app_logs:/var/log/badminton
    networks:
      - badminton-net

volumes:
  mysql_data:
    driver: local
  app_logs:
    driver: local

networks:
  badminton-net:
    driver: bridge
